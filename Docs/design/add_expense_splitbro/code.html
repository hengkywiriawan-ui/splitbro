<!-- Floating Micro-interaction (Heritage Success) -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full flex items-center gap-2 shadow-xl opacity-0 transition-opacity pointer-events-none z-[60]" id="toast">
<span class="material-symbols-outlined text-tertiary-fixed-dim">check_circle</span>
<span class="font-body-md">Expense drafted successfully</span>
</div>
<script>
        // Micro-interaction for the "Save" button
        const saveBtn = document.querySelector('button.bg-tertiary-container');
        const toast = document.getElementById('toast');
        
        saveBtn.addEventListener('click', () => {
            const originalHTML = saveBtn.innerHTML;
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
            setTimeout(() => {
                toast.classList.remove('opacity-0');
                saveBtn.innerHTML = originalHTML;
                setTimeout(() => {
                    toast.classList.add('opacity-0');
                }, 2000);
            }, 800);
        });

        // Toggle logic for avatars
        document.querySelectorAll('button.rounded-full.border-2.overflow-hidden').forEach(avatar => {
            avatar.addEventListener('click', () => {
                const isSelected = avatar.classList.contains('border-primary');
                if (isSelected) {
                    avatar.classList.remove('border-primary');
                    avatar.classList.add('border-transparent', 'grayscale');
                    avatar.querySelector('.absolute')?.remove();
                } else {
                    avatar.classList.add('border-primary');
                    avatar.classList.remove('border-transparent', 'grayscale');
                    const checkMark = document.createElement('div');
                    checkMark.className = 'absolute inset-0 bg-primary/20 flex items-center justify-center';
                    checkMark.innerHTML = '<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                    avatar.prepend(checkMark);
                }
            });
        });
    </script>
